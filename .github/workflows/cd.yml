name: CD

on:
  workflow_dispatch:
  workflow_call:

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      CI: true
    outputs:
      image: ${{ steps.prep.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: prep
        env:
          DEFAULT_USERNAME: ${{ github.actor }}
          DEFAULT_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          INPUT_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          INPUT_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          SHA: ${{ github.sha }}
        run: |
          registry="${SERVER_URL#https://}"
          registry="${registry#http://}"
          registry="${registry,,}"
          image="${registry}/${REPOSITORY,,}"
          short_sha="$(printf '%s' "${SHA}" | cut -c1-12)"

          username="${INPUT_USERNAME:-$DEFAULT_USERNAME}"
          password="${INPUT_PASSWORD:-$DEFAULT_PASSWORD}"

          {
            echo "registry=${registry}"
            echo "image=${image}:sha-${short_sha}"
            echo "username=${username}"
            echo "password=${password}"
            echo "tags<<EOF"
            echo "${image}:sha-${short_sha}"

            if [ "${REF_TYPE}" = "branch" ] && [ "${REF_NAME}" = "main" ]; then
              echo "${image}:latest"
            fi

            if [ "${REF_TYPE}" = "tag" ]; then
              echo "${image}:${REF_NAME}"
            fi

            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Gitea Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.prep.outputs.registry }}
          username: ${{ steps.prep.outputs.username }}
          password: ${{ steps.prep.outputs.password }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    needs: docker
    if: ${{ needs.docker.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_CONN_STR: ${{ vars.DEPLOY_CONN_STR }}
      DEPLOY_PRIVATE_KEY: ${{ secrets.DEPLOY_PRIVATE_KEY }}
      IMAGE_NAME: ${{ needs.docker.outputs.image }}

    steps:
      - name: Parse deploy config
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_CONN_STR}" ]; then
            echo "DEPLOY_CONN_STR variable is required" >&2
            exit 1
          fi

          if [ -z "${IMAGE_NAME}" ]; then
            echo "image output is required" >&2
            exit 1
          fi

          compose_path="${DEPLOY_CONN_STR##*:}"
          deploy_rest="${DEPLOY_CONN_STR%:*}"
          deploy_port="${deploy_rest##*:}"
          deploy_target="${deploy_rest%:*}"

          if [ "${compose_path}" = "${DEPLOY_CONN_STR}" ] || [ -z "${deploy_rest}" ]; then
            echo "DEPLOY_CONN_STR format invalid: expected <user>@<host>:<port>:<compose_path>" >&2
            exit 1
          fi

          if [ -z "${deploy_target}" ] || [ -z "${deploy_port}" ] || [ -z "${compose_path}" ]; then
            echo "DEPLOY_CONN_STR contains empty segment" >&2
            exit 1
          fi

          if ! printf '%s' "${deploy_target}" | grep -q '@'; then
            echo "DEPLOY_CONN_STR target must be <user>@<host>" >&2
            exit 1
          fi

          if ! printf '%s' "${deploy_port}" | grep -Eq '^[0-9]+$'; then
            echo "DEPLOY_CONN_STR port must be numeric" >&2
            exit 1
          fi

          case "${compose_path}" in
            *.yml|*.yaml)
              compose_dir="$(dirname "${compose_path}")"
              compose_file="$(basename "${compose_path}")"
              ;;
            *)
              compose_dir="${compose_path}"
              compose_file=""
              ;;
          esac

          {
            echo "deploy_target=${deploy_target}"
            echo "deploy_port=${deploy_port}"
            echo "compose_dir=${compose_dir}"
            echo "compose_file=${compose_file}"
          } >> "${GITHUB_OUTPUT}"

      - name: Write SSH key
        shell: bash
        env:
          PRIVATE_KEY: ${{ env.DEPLOY_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${PRIVATE_KEY}" ]; then
            echo "DEPLOY_PRIVATE_KEY secret is required" >&2
            exit 1
          fi

          install -m 600 /dev/null deploy.key
          printf '%b\n' "${PRIVATE_KEY}" > deploy.key

      - name: Deploy
        shell: bash
        env:
          DEPLOY_TARGET: ${{ steps.prep.outputs.deploy_target }}
          DEPLOY_PORT: ${{ steps.prep.outputs.deploy_port }}
          COMPOSE_DIR: ${{ steps.prep.outputs.compose_dir }}
          COMPOSE_FILE: ${{ steps.prep.outputs.compose_file }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail

          remote_command="cd '${COMPOSE_DIR}' && IMAGE_NAME='${IMAGE_NAME}' docker compose pull && IMAGE_NAME='${IMAGE_NAME}' docker compose up -d"
          if [ -n "${COMPOSE_FILE}" ]; then
            remote_command="cd '${COMPOSE_DIR}' && IMAGE_NAME='${IMAGE_NAME}' docker compose -f '${COMPOSE_FILE}' pull && IMAGE_NAME='${IMAGE_NAME}' docker compose -f '${COMPOSE_FILE}' up -d"
          fi

          ssh -i deploy.key \
            -p "${DEPLOY_PORT}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${DEPLOY_TARGET}" \
            "set -euo pipefail && ${remote_command}"
