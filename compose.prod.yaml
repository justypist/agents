services:
  agents:
    image: agents:latest
    container_name: agents
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - public
    #ports:
    #  - "3000:3000"
    labels:
      caddy: agents.typist.cc
      caddy.reverse_proxy: "{{upstreams 3000}}"
  agents-exec-sandbox:
    image: agents-exec-sandbox:latest
    container_name: agents-exec-sandbox
    restart: unless-stopped
    command: sleep infinity
    working_dir: /workspace
    network_mode: bridge
    volumes:
      - exec-workspace:/workspace
      - exec-home:/home/agent

networks:
  public:
    external: true

volumes:
  data:
  exec-workspace:
    name: agents-exec-workspace
  exec-home:
    name: agents-exec-home
