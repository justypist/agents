services:
  agents:
    image: agents:latest
    container_name: agents
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - workspace:/workspace
      - persist:/persist
    networks:
      - public
    #ports:
    #  - "3000:3000"
    labels:
      caddy: agents.typist.cc
      caddy.reverse_proxy: "{{upstreams 3000}}"
networks:
  public:
    external: true

volumes:
  workspace:
    name: agents-workspace
  persist:
    name: agents-persist
